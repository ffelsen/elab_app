<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: transparent; overflow: hidden; }

  textarea {
    display: block; width: 100%; min-height: 100px; resize: vertical;
    font-size: 14px; padding: 8px 10px; line-height: 1.5;
    border: 1px solid #ccc; border-radius: 6px;
    font-family: inherit; color: #111; background: #fff;
    transition: border-color 0.15s; outline: none;
  }
  textarea:focus { border-color: #ff4b4b; box-shadow: 0 0 0 2px rgba(255,75,75,0.15); }

  #hint { font-size: 11px; color: #999; margin-top: 4px; }

  #dropdown {
    display: none; margin-top: 4px; width: 100%;
    background: #fff; border: 1px solid #ddd;
    border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.10);
  }
  .ac-item {
    padding: 6px 10px; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: #222; user-select: none;
  }
  .ac-item:hover, .ac-item.selected { background: #fff5f5; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 1px 5px;
    border-radius: 3px; flex-shrink: 0;
  }
  .badge-item { background: #dbeafe; color: #1e40af; }
  #item-count { font-size: 10px; color: #aaa; padding: 3px 10px; border-top: 1px solid #f0f0f0; }
</style>
</head>
<body>
<textarea id="ta" rows="4" spellcheck="true"></textarea>
<div id="hint">Ctrl+Enter to submit &nbsp;·&nbsp; type # to link a resource</div>
<div id="dropdown"></div>

<script>
// ── Streamlit communication protocol ─────────────────────────────────────────
const Streamlit = {
  _heartbeat: null,

  setComponentValue(value) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: 'streamlit:setComponentValue', value, dataType: 'json' }, '*'
    );
  },

  setFrameHeight(height) {
    const h = (height !== undefined) ? height : document.body.scrollHeight;
    window.parent.postMessage(
      { isStreamlitMessage: true, type: 'streamlit:setFrameHeight', height: h }, '*'
    );
  },

  _sendReady() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: 'streamlit:componentReady', apiVersion: 1 }, '*'
    );
  },

  _startHeartbeat() {
    if (Streamlit._heartbeat) return;
    Streamlit._sendReady();
    Streamlit._heartbeat = setInterval(Streamlit._sendReady, 100);
  },

  onRender: null,

  _handleMessage(event) {
    if (!event.data || event.data.type !== 'streamlit:render') return;
    if (Streamlit._heartbeat) { clearInterval(Streamlit._heartbeat); Streamlit._heartbeat = null; }
    if (Streamlit.onRender) Streamlit.onRender(event.data);
  }
};

window.addEventListener('message', e => Streamlit._handleMessage(e));
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => Streamlit._startHeartbeat());
} else {
  Streamlit._startHeartbeat();
}
// ─────────────────────────────────────────────────────────────────────────────

let ITEMS        = [];
let BASE_URL     = '';
let initialized  = false;
let lastResetKey = null;

const ta       = document.getElementById('ta');
const dropdown = document.getElementById('dropdown');

const ac = { active: false, hashPos: -1, query: '', results: [], selIdx: -1 };

// ── Filtering ─────────────────────────────────────────────────────────────────
function filterItems(query) {
  const q = query.toLowerCase();
  if (!q) return ITEMS.slice(0, 10);
  return ITEMS.filter(it => it.name.toLowerCase().includes(q)).slice(0, 10);
}

// ── Dropdown ──────────────────────────────────────────────────────────────────
function renderDropdown() {
  if (!ac.active || ac.results.length === 0) {
    dropdown.style.display = 'none';
    Streamlit.setFrameHeight();
    return;
  }

  dropdown.innerHTML = '';
  ac.results.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'ac-item' + (idx === ac.selIdx ? ' selected' : '');
    div.innerHTML = `<span class="badge badge-item">R</span>${escapeHtml(item.name)}`;
    div.addEventListener('mousedown', e => { e.preventDefault(); insertItem(item); });
    dropdown.appendChild(div);
  });

  const info = document.createElement('div');
  info.id = 'item-count';
  info.textContent = `${ac.results.length} of ${ITEMS.length} resources`;
  dropdown.appendChild(info);

  dropdown.style.display = 'block';
  Streamlit.setFrameHeight(document.body.scrollHeight);
}

function acOpen(hashPos, query) {
  ac.active = true; ac.hashPos = hashPos; ac.query = query;
  ac.results = filterItems(query);
  ac.selIdx  = ac.results.length > 0 ? 0 : -1;
  renderDropdown();
}

function acClose() {
  ac.active = false;
  dropdown.style.display = 'none';
  Streamlit.setFrameHeight();
}

function moveSelection(delta) {
  if (!ac.active || ac.results.length === 0) return;
  ac.selIdx = (ac.selIdx + delta + ac.results.length) % ac.results.length;
  renderDropdown();
}

function itemUrl(item) { return `${BASE_URL}/database.php?mode=view&id=${item.id}`; }

function insertItem(item) {
  const link   = `[${item.name}](${itemUrl(item)})`;
  const before = ta.value.substring(0, ac.hashPos);
  const after  = ta.value.substring(ta.selectionStart);
  ta.value = before + link + after;
  ta.setSelectionRange(ac.hashPos + link.length, ac.hashPos + link.length);
  acClose();
  ta.focus();
  // No sendValue here — text is sent only when the user submits
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Textarea events ───────────────────────────────────────────────────────────
ta.addEventListener('input', () => {
  // Autocomplete detection only — do NOT call sendValue here.
  // Sending on every keystroke causes a Streamlit rerun on every character,
  // which breaks other widgets and leads to duplicate submissions.
  const pos  = ta.selectionStart;
  const text = ta.value;
  let hashPos = -1;
  for (let i = pos - 1; i >= 0; i--) {
    if (text[i] === '#') { hashPos = i; break; }
    if (text[i] === ' ' || text[i] === '\n') break;
  }
  if (hashPos !== -1) {
    acOpen(hashPos, text.substring(hashPos + 1, pos));
  } else {
    acClose();
  }
});

ta.addEventListener('keydown', e => {
  if (ac.active) {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveSelection(+1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveSelection(-1); return; }
    if (e.key === 'Escape')    { acClose(); return; }
    if (e.key === 'Enter' && ac.selIdx >= 0) { e.preventDefault(); insertItem(ac.results[ac.selIdx]); return; }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); submitText(); }
});

document.addEventListener('mousedown', e => {
  if (!dropdown.contains(e.target) && e.target !== ta) acClose();
});

function submitText() {
  if (ta.value.trim()) {
    Streamlit.setComponentValue({ text: ta.value, submitted: true });
  }
}

// ── Resize observer ───────────────────────────────────────────────────────────
new ResizeObserver(() => {
  if (!ac.active) Streamlit.setFrameHeight();
}).observe(document.body);

// ── Render handler ────────────────────────────────────────────────────────────
Streamlit.onRender = function(data) {
  const args     = data.args || {};
  ITEMS    = args.items    || [];
  BASE_URL = (args.base_url || '').replace(/\/$/, '');

  const resetKey = args.reset_key ?? 0;

  if (!initialized) {
    // First render: apply initial value and placeholder
    ta.value       = args.value       || '';
    ta.placeholder = args.placeholder || '';
    lastResetKey   = resetKey;
    initialized    = true;
    // Send initial value so Python has a non-null starting state
    Streamlit.setComponentValue({ text: ta.value, submitted: false });
  } else if (resetKey !== lastResetKey) {
    // Python incremented reset_key to signal "clear the textarea"
    ta.value     = '';
    lastResetKey = resetKey;
    acClose();
    Streamlit.setComponentValue({ text: '', submitted: false });
  }
  // On normal reruns (no reset): send nothing — avoids spurious reruns and
  // prevents stale submitted:true from being re-processed.

  Streamlit.setFrameHeight();
};
</script>
</body>
</html>
